apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: edis
spec:
  replicas: 8
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: edis-storage
          mountPath: /usr/share/nginx/html
      volumes:
      - name: edis-storage
        persistentVolumeClaim:
          claimName: edis-data
