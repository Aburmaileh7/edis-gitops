apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edis-nginx-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Aburmaileh7/edis-gitops.git' 
    targetRevision: main
    path: .
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: edis
  
  syncPolicy:
    automated:
      prune: true     
      selfHeal: true  
    syncOptions:
      - CreateNamespace=true
